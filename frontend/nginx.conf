server {
    listen 80;

    location /api/ {
        proxy_pass https://apicreapes.leanttro.com/api/;
        proxy_set_header Host apicreapes.leanttro.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
